# Nginx config for SPA static hosting
# Copy to: /etc/nginx/sites-available/betsfire

server {
    listen 80;
    server_name velobet.com www.velobet.com;
    
    root /var/www/betsfire/out;
    index index.html;
    
    # SPA catch-all: all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
